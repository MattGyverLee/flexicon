name: publish

# Publish pyflexicon to PyPI via Trusted Publishing (OIDC -- no stored secrets).
# Fires when a version tag is pushed, e.g.  git tag v4.1.0 && git push --tags
# (or: gh release create v4.1.0).
#
# One-time setup on pypi.org: project -> Publishing -> add a GitHub trusted
# publisher with repo, workflow file name "publish.yml", and environment "pypi".

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Build sdist and wheel
        run: pipx run build
      - name: Store the distribution packages
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write          # OIDC token for Trusted Publishing -- no API token
    steps:
      - name: Download the distribution packages
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
